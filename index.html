<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>nerual</title>
<meta name="description" content="Daily accountability tracker">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="nerual">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%230a0a0f'/%3E%3Ctext x='90' y='118' font-size='100' text-anchor='middle' fill='%2300e5ff' font-family='system-ui' font-weight='900'%3En%3C/text%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--border:#2a2a3e;
  --text:#e8e8f0;--text2:#8888a0;--accent:#00e5ff;--accent2:#7c3aed;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100dvh;padding-bottom:80px;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px 12px}
.brand{font-size:1.5rem;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.date-label{font-size:.8rem;color:var(--text2);margin-top:2px}

/* Score badge */
.score-wrap{display:flex;align-items:center;gap:16px;padding:16px 20px}
.score-ring{position:relative;width:72px;height:72px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:6}
.score-ring .bg-ring{stroke:var(--surface2)}
.score-ring .fg-ring{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
.score-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:800}
.score-details{flex:1;display:flex;flex-direction:column;gap:4px}
.score-details .label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.score-details .value{font-size:.85rem;font-weight:600}

/* Quote */
.quote{padding:0 20px 16px;font-size:.8rem;color:var(--text2);font-style:italic;line-height:1.4;border-bottom:1px solid var(--border)}

/* Nav tabs */
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;font-size:.65rem;color:var(--text2);cursor:pointer;transition:color .2s;border:none;background:none}
.tab.active{color:var(--accent)}
.tab span{font-size:1.25rem}

/* Sections */
.view{display:none}
.view.active{display:block}
.section{padding:12px 20px}
.section-title{font-size:.85rem;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Checklist items */
.item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:background .15s,transform .1s;border:1px solid transparent;-webkit-user-select:none;user-select:none}
.item:active{transform:scale(.98);background:var(--surface2)}
.item.checked{border-color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.item.checked .item-text{color:var(--text2)}
.checkbox{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px}
.item.checked .checkbox{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.item-text{font-size:.9rem;line-height:1.3}

/* History */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px 20px}
.cal-header{font-size:.65rem;color:var(--text2);text-align:center;padding:4px 0;font-weight:600}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;transition:transform .1s;position:relative}
.cal-day:active{transform:scale(.9)}
.cal-day.empty{pointer-events:none}
.cal-day.today{outline:2px solid var(--accent);outline-offset:-2px}
.cal-day.has-data{font-weight:700}
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
.cal-month-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:.85rem}
.cal-month-label{font-weight:700;font-size:.95rem}

/* Day detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:1rem;margin-bottom:12px}
.modal-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:.85rem;color:var(--text2)}
.modal-item.was-checked{color:var(--text)}
.modal-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Chart */
.chart-wrap{padding:0 20px 20px}
.chart{display:flex;align-items:flex-end;gap:4px;height:140px;background:var(--surface);border-radius:12px;padding:16px 12px 28px;position:relative}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s ease}
.chart-label{font-size:.55rem;color:var(--text2);position:absolute;bottom:8px;transform:translateX(-50%)}
.chart-title{font-size:.85rem;font-weight:700;color:var(--text2);padding:12px 20px 8px}

/* Streaks */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px 20px}
.stat-card{background:var(--surface);border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .lbl{font-size:.65rem;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Export button */
.btn{display:block;width:calc(100% - 40px);margin:10px 20px;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:.9rem;border:none;border-radius:12px;cursor:pointer;text-align:center;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:12px 24px;border-radius:12px;font-size:.85rem;opacity:0;transition:all .3s;z-index:300;pointer-events:none;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:500px){
  body{max-width:500px;margin:0 auto}
  .tabs{max-width:500px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">nerual</div>
  <div class="date-label" id="dateLabel"></div>
</div>

<!-- Score -->
<div class="score-wrap">
  <div class="score-ring">
    <svg viewBox="0 0 80 80" width="72" height="72">
      <circle class="bg-ring" cx="40" cy="40" r="34"/>
      <circle class="fg-ring" id="scoreRing" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
    </svg>
    <div class="score-pct" id="scorePct">0%</div>
  </div>
  <div class="score-details">
    <div><span class="label">Checked</span> <span class="value" id="checkedCount">0 / 0</span></div>
    <div><span class="label">Streak</span> <span class="value" id="streakDisplay">0 days</span></div>
    <div><span class="label">Best</span> <span class="value" id="bestStreak">0 days</span></div>
  </div>
</div>

<!-- Quote -->
<div class="quote" id="quoteBox"></div>

<!-- Tab Views -->
<div class="view active" id="viewToday">
  <!-- Checklist rendered by JS -->
</div>

<div class="view" id="viewHistory">
  <div class="chart-title">Last 14 Days</div>
  <div class="chart-wrap"><div class="chart" id="chart"></div></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="statStreak">0</div><div class="lbl">Streak</div></div>
    <div class="stat-card"><div class="num" id="statBest">0</div><div class="lbl">Best</div></div>
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Days</div></div>
  </div>
  <div class="cal-month-nav">
    <button id="calPrev">&larr;</button>
    <span class="cal-month-label" id="calMonthLabel"></span>
    <button id="calNext">&rarr;</button>
  </div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<div class="view" id="viewExport">
  <div class="section">
    <div class="section-title">Daily Report</div>
    <pre style="background:var(--surface);padding:16px;border-radius:12px;font-size:.8rem;line-height:1.5;white-space:pre-wrap;color:var(--text2);max-height:50vh;overflow-y:auto;border:1px solid var(--border)" id="exportPreview"></pre>
  </div>
  <button class="btn" id="copyBtn">Copy to Clipboard</button>
  <button class="btn btn-outline" id="resetBtn" style="margin-top:4px">Reset Today</button>
</div>

<!-- Bottom Nav -->
<nav class="tabs">
  <button class="tab active" data-view="viewToday"><span>&#10003;</span>Today</button>
  <button class="tab" data-view="viewHistory"><span>&#9776;</span>History</button>
  <button class="tab" data-view="viewExport"><span>&#9993;</span>Export</button>
</nav>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const SECTIONS = [
  { id: 'morning', emoji: '\u2600\uFE0F', title: 'Morning', items: [
    '2-3 eggs', 'Greens (spinach/kale)', 'Methylated B-Complex',
    'Methylcobalamin B12', 'Vitamin D3', 'Omega-3 fish oil', 'Coffee'
  ]},
  { id: 'midday', emoji: '\uD83C\uDF57', title: 'Midday', items: [
    'Grilled nuggets (protein)', 'Side salad or fruit cup', 'No yogurt parfait'
  ]},
  { id: 'dinner', emoji: '\uD83C\uDF7D', title: 'Dinner', items: [
    'Protein + vegetable + healthy fat'
  ]},
  { id: 'snacks', emoji: '\uD83E\uDD5C', title: 'Snacks', items: [
    'Healthy snacks (nuts, eggs, banana+PB)'
  ]},
  { id: 'night', emoji: '\uD83C\uDF19', title: 'Night', items: [
    'No food 2hrs before bed', 'Games off by 10 PM',
    'In bed by 10:30', 'No porn'
  ]},
  { id: 'habits', emoji: '\uD83D\uDCAA', title: 'Habits', items: [
    'Went to class', 'Did Rainmakers work', 'Talked to someone new',
    'Read/listened to something', 'Exercised or played basketball'
  ]}
];

const ALL_ITEMS = SECTIONS.flatMap(s => s.items.map(item => `${s.id}:${item}`));
const TOTAL_ITEMS = ALL_ITEMS.length;

const QUOTES = [
  "Discipline is choosing between what you want now and what you want most.",
  "You don't rise to the level of your goals. You fall to the level of your systems.",
  "The man who moves a mountain begins by carrying away small stones.",
  "Hard choices, easy life. Easy choices, hard life.",
  "Your future self is watching you right now through memories.",
  "Suffer the pain of discipline or suffer the pain of regret.",
  "The best time to plant a tree was 20 years ago. The second best time is now.",
  "Don't count the days. Make the days count.",
  "Results happen over time, not overnight. Work hard, stay consistent, and be patient.",
  "Success is the sum of small efforts repeated day in and day out.",
  "You are what you repeatedly do. Excellence is not an act but a habit.",
  "The only person you are destined to become is the person you decide to be.",
  "Winners embrace hard work. They love the discipline of it.",
  "If you want something you've never had, you must do something you've never done.",
  "The grind is not glamorous but the results are.",
  "Be stronger than your strongest excuse.",
  "Obsessed is a word the lazy use to describe the dedicated.",
  "No one is coming to save you. This life is 100% your responsibility.",
  "A year from now you'll wish you had started today.",
  "Consistency is what transforms average into excellence.",
  "Your habits are either your best friend or your worst enemy.",
  "The pain you feel today will be the strength you feel tomorrow.",
  "Stop waiting for motivation. Discipline is more reliable.",
  "Every action you take is a vote for the person you want to become.",
  "Comfort is the enemy of progress.",
  "Small daily improvements over time lead to stunning results.",
  "Don't watch the clock. Do what it does. Keep going.",
  "Champions don't show up to get everything they want. They show up to give everything they have.",
  "What you do every day matters more than what you do once in a while.",
  "The secret of getting ahead is getting started."
];

// ============ UTILS ============
function getTodayKey() {
  // Day resets at 5 AM CDT (UTC-5) / CST (UTC-6). We'll use America/Chicago.
  const now = new Date();
  const chi = new Date(now.toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  if (chi.getHours() < 5) chi.setDate(chi.getDate() - 1);
  return `${chi.getFullYear()}-${String(chi.getMonth()+1).padStart(2,'0')}-${String(chi.getDate()).padStart(2,'0')}`;
}

function getChicagoNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
}

function loadDay(key) {
  try { return JSON.parse(localStorage.getItem(`nerual:${key}`)) || {}; } catch { return {}; }
}

function saveDay(key, data) {
  localStorage.setItem(`nerual:${key}`, JSON.stringify(data));
}

function getAllDayKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('nerual:') && k !== 'nerual:meta') keys.push(k.replace('nerual:', ''));
  }
  return keys.sort();
}

function dayScore(data) {
  const checked = ALL_ITEMS.filter(k => data[k]).length;
  return { checked, total: TOTAL_ITEMS, pct: Math.round((checked / TOTAL_ITEMS) * 100) };
}

function scoreColor(pct) {
  if (pct >= 80) return 'var(--green)';
  if (pct >= 50) return 'var(--yellow)';
  return 'var(--red)';
}

function formatDate(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============ STATE ============
let todayKey = getTodayKey();
let todayData = loadDay(todayKey);
let calMonth = (() => { const n = getChicagoNow(); return { year: n.getFullYear(), month: n.getMonth() }; })();

// ============ RENDER CHECKLIST ============
function renderChecklist() {
  const container = document.getElementById('viewToday');
  container.innerHTML = '';
  SECTIONS.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${section.emoji} ${section.title}</div>`;
    section.items.forEach(item => {
      const key = `${section.id}:${item}`;
      const checked = !!todayData[key];
      const el = document.createElement('div');
      el.className = `item${checked ? ' checked' : ''}`;
      el.innerHTML = `<div class="checkbox">${checked ? '\u2713' : ''}</div><div class="item-text">${item}</div>`;
      el.addEventListener('click', () => {
        todayData[key] = !todayData[key];
        saveDay(todayKey, todayData);
        renderChecklist();
        updateScore();
      });
      sec.appendChild(el);
    });
    container.appendChild(sec);
  });
}

// ============ SCORE ============
function updateScore() {
  const { checked, total, pct } = dayScore(todayData);
  const ring = document.getElementById('scoreRing');
  const circumference = 213.6;
  ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
  ring.style.stroke = scoreColor(pct);
  document.getElementById('scorePct').textContent = `${pct}%`;
  document.getElementById('scorePct').style.color = scoreColor(pct);
  document.getElementById('checkedCount').textContent = `${checked} / ${total}`;

  const { current, best } = calcStreaks();
  document.getElementById('streakDisplay').textContent = `${current} days`;
  document.getElementById('bestStreak').textContent = `${best} days`;
}

// ============ STREAKS ============
function calcStreaks() {
  const keys = getAllDayKeys().sort().reverse();
  let current = 0;
  let best = 0;
  let streak = 0;
  let expectDate = todayKey;

  // Check if today qualifies
  const todayPct = dayScore(loadDay(todayKey)).pct;
  if (todayPct < 70) {
    // Check if yesterday had a streak
    expectDate = prevDay(todayKey);
    // current streak is 0 if today isn't qualifying yet
  } else {
    current = -1; // will count below
  }

  for (const key of keys) {
    const data = loadDay(key);
    const { pct } = dayScore(data);
    if (pct >= 70) {
      streak++;
    } else {
      if (streak > best) best = streak;
      streak = 0;
    }
  }
  if (streak > best) best = streak;

  // Current streak: count backwards from today/yesterday
  let cur = 0;
  let d = todayKey;
  while (true) {
    const data = loadDay(d);
    const { pct } = dayScore(data);
    if (pct >= 70) { cur++; d = prevDay(d); }
    else break;
  }

  return { current: cur, best, total: keys.length };
}

function prevDay(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

// ============ QUOTE ============
function setQuote() {
  const dayNum = Math.floor(Date.now() / 86400000);
  document.getElementById('quoteBox').textContent = `"${QUOTES[dayNum % QUOTES.length]}"`;
}

// ============ DATE LABEL ============
function setDateLabel() {
  const chi = getChicagoNow();
  document.getElementById('dateLabel').textContent = chi.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
}

// ============ TABS ============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.view).classList.add('active');
    if (tab.dataset.view === 'viewHistory') renderHistory();
    if (tab.dataset.view === 'viewExport') renderExport();
  });
});

// ============ HISTORY ============
function renderHistory() {
  renderChart();
  renderCalendar();
  const { current, best, total } = calcStreaks();
  document.getElementById('statStreak').textContent = current;
  document.getElementById('statBest').textContent = best;
  document.getElementById('statTotal').textContent = total;
}

function renderChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const days = [];
  let d = todayKey;
  for (let i = 0; i < 14; i++) {
    days.unshift(d);
    d = prevDay(d);
  }
  days.forEach(key => {
    const data = loadDay(key);
    const { pct } = dayScore(data);
    const wrap = document.createElement('div');
    wrap.className = 'chart-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'chart-bar';
    bar.style.height = `${Math.max(pct, 2)}%`;
    bar.style.background = scoreColor(pct);
    const lbl = document.createElement('div');
    lbl.className = 'chart-label';
    const [,,day] = key.split('-');
    lbl.textContent = parseInt(day);
    wrap.appendChild(bar);
    wrap.appendChild(lbl);
    wrap.addEventListener('click', () => showDayModal(key));
    chart.appendChild(wrap);
  });
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const { year, month } = calMonth;
  document.getElementById('calMonthLabel').textContent = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data = loadDay(key);
    const hasData = Object.keys(data).length > 0;
    const { pct } = dayScore(data);
    const el = document.createElement('div');
    el.className = `cal-day${hasData ? ' has-data' : ''}${key === todayKey ? ' today' : ''}`;
    if (hasData) {
      el.style.background = scoreColor(pct);
      el.style.color = '#fff';
      el.style.opacity = Math.max(0.4, pct / 100);
    } else {
      el.style.background = 'var(--surface)';
    }
    el.textContent = d;
    if (hasData) el.addEventListener('click', () => showDayModal(key));
    grid.appendChild(el);
  }
}

document.getElementById('calPrev').addEventListener('click', () => {
  calMonth.month--;
  if (calMonth.month < 0) { calMonth.month = 11; calMonth.year--; }
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
  calMonth.month++;
  if (calMonth.month > 11) { calMonth.month = 0; calMonth.year++; }
  renderCalendar();
});

// ============ DAY DETAIL MODAL ============
function showDayModal(key) {
  const data = loadDay(key);
  const { checked, total, pct } = dayScore(data);
  document.getElementById('modalTitle').textContent = `${formatDate(key)} \u2014 ${pct}%`;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  SECTIONS.forEach(section => {
    const title = document.createElement('div');
    title.style.cssText = 'font-size:.75rem;color:var(--text2);margin:12px 0 6px;font-weight:700';
    title.textContent = `${section.emoji} ${section.title}`;
    body.appendChild(title);
    section.items.forEach(item => {
      const k = `${section.id}:${item}`;
      const wasChecked = !!data[k];
      const el = document.createElement('div');
      el.className = `modal-item${wasChecked ? ' was-checked' : ''}`;
      el.innerHTML = `<div class="dot" style="background:${wasChecked ? 'var(--green)' : 'var(--red)'}"></div>${item}`;
      body.appendChild(el);
    });
  });
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
});

// ============ EXPORT ============
function renderExport() {
  const { checked, total, pct } = dayScore(todayData);
  const { current } = calcStreaks();
  let text = `nerual \u2014 ${formatDate(todayKey)}\n`;
  text += `Score: ${pct}% (${checked}/${total})\n`;
  text += `Streak: ${current} days\n`;
  text += `${'='.repeat(30)}\n\n`;
  SECTIONS.forEach(section => {
    text += `${section.emoji} ${section.title}\n`;
    section.items.forEach(item => {
      const k = `${section.id}:${item}`;
      text += `  ${todayData[k] ? '\u2705' : '\u274C'} ${item}\n`;
    });
    text += '\n';
  });
  text += `${'='.repeat(30)}\n`;
  text += `"${QUOTES[Math.floor(Date.now()/86400000) % QUOTES.length]}"`;
  document.getElementById('exportPreview').textContent = text;
}

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('exportPreview').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!');
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all checkboxes for today?')) {
    todayData = {};
    saveDay(todayKey, todayData);
    renderChecklist();
    updateScore();
    renderExport();
    showToast('Today reset');
  }
});

// ============ AUTO RESET CHECK ============
function checkDayRollover() {
  const newKey = getTodayKey();
  if (newKey !== todayKey) {
    todayKey = newKey;
    todayData = loadDay(todayKey);
    renderChecklist();
    updateScore();
    setDateLabel();
    setQuote();
  }
}
setInterval(checkDayRollover, 30000);

// ============ INIT ============
function init() {
  setDateLabel();
  setQuote();
  renderChecklist();
  updateScore();
}

init();

// ============ SERVICE WORKER ============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
